spring:
  application:
    name: Gentleman - QuizService
  profiles:
    active: dev
  config:
    import: application-prod.yml
  cache:
    type: redis
    cache-names: redis-cache
  jpa:
    database-platform: ru.gentleman.order.config.AxonPostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  datasource:
    url: jdbc:postgresql://localhost:5437/order
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  flyway:
    url: jdbc:postgresql://localhost:5437/order
    user: postgres
    password: password
    baseline-on-migrate: true
    locations: classpath:db/migration,classpath:others/path
    baseline-version: 0
  messages:
    basename: messages
    encoding: UTF-8
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9000/oauth2/jwks
server:
  port: 3030

url:
  callback: https://commonsensible-transthalamic-jannet.ngrok-free.dev/api/v1/crypto-payments/webhook
  successUrl: https://commonsensible-transthalamic-jannet.ngrok-free.dev/api/v1/crypto-payments/webhook
  cancelUrl:  https://commonsensible-transthalamic-jannet.ngrok-free.dev/api/v1/crypto-payments/webhook

redisson:
  host: 127.0.0.1
  port: 6379
  username: default
  password: password

otel:
  service:
    name: "order-service"
  traces:
    exporter: "otlp"
    sampler: "always_on"
  metrics:
    exporter: "otlp"
    export:
      interval: 5000
  logs:
    exporter: "otlp"
  exporter:
    otlp:
      protocol: "grpc"
      endpoint: "http://localhost:4317"